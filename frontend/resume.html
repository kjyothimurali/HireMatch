<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <!-- Bootstrap (only layout) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e2e8f0;
        }

        .title {
            text-align: center;
            margin-top: 80px;
            font-size: 2.2rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .card-container {
            max-width: 700px;
            margin: 30px auto;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            resize: none;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        select {
            background: rgba(255,255,255,0.05) !important;
            color: white !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 10px !important;
            padding: 10px;
        }

        option {
            color: black;
        }

        .file-label {
            display: block;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.3);
            cursor: pointer;
            color: #94a3b8;
        }

        .file-label:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-custom {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .btn-custom:active {
            transform: scale(0.98);
        }

        #resumeResult {
            margin-top: 20px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .badge-skill {
            margin: 3px;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .match {
            background: #22c55e;
        }

        .missing {
            background: #ef4444;
        }
        .result-card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* GRID */
.info-grid {
    display: flex;
    justify-content: space-between;
}

/* LABEL */
.label {
    color: #94a3b8;
    font-size: 0.9rem;
}

/* PROGRESS BAR */
.progress {
    height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    text-align: center;
    color: white;
    font-size: 12px;
}

/* SKILL CHIPS */
.chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}

.chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
}

/* COLORS */
.match {
    background: rgba(34,197,94,0.2);
    color: #22c55e;
}

.missing {
    background: rgba(239,68,68,0.2);
    color: #ef4444;
}

/* SUGGESTIONS */
.suggestions li {
    margin-bottom: 6px;
}
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 40px;

    backdrop-filter: blur(15px);
    background: rgba(0, 0, 0, 0.6);   /* DARK GLASS */
    border-bottom: 1px solid rgba(255,255,255,0.2);

    z-index: 1000;
}

/* LOGO */
.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ffffff;
}

/* CENTER NAV */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links button {
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links button:hover {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: black;
}

/* PROFILE SECTION */
.profile {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* USER NAME */
#userName {
    color: #ffffff;
    font-weight: 500;
}

/* LOGOUT BUTTON */
.logout {
    background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.logout:hover {
    opacity: 0.85;
}
    </style>
</head>

<body>
<div class="navbar">
    <div class="logo"> HireMatch</div>

    <div class="nav-links">
        <button onclick="goHome()">Home</button>
        <button onclick="goJob()">Jobs</button>
        <button onclick="goResume()">Resume</button>
        <button onclick="goHistory()">History</button>
    </div>

    <div class="profile">
        <span id="userName">👤 User</span>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</div>
<h2 class="title">Resume Analyzer</h2>

<div class="card-container">
    

    <div class="card-glass">

        <!-- TEXT INPUT -->
        <textarea id="resumeText" placeholder="Paste resume here..."></textarea>

        <!-- PDF UPLOAD -->
        <label class="file-label">
            Upload Resume PDF
            <input type="file" id="pdfFile" hidden accept=".pdf">
        </label>

        <!-- SECTOR -->
        <select id="sector" class="mt-3" onchange="loadRoles()">
            <option value="">Select Sector</option>
            <option value="IT">IT</option>
            <option value="Finance">Finance</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Sales & Marketing">Sales & Marketing</option>
        </select>

        <!-- ROLE -->
        <select id="role" class="mt-3">
            <option value="">Select Role</option>
        </select>

        <!-- BUTTON -->
        <button class="btn-custom" onclick="analyzeResume()">
            Analyze Resume
        </button>

    </div>

</div>

<!-- RESULT -->
<div id="resumeResult"></div>

<script src="/static/script.js"></script>
<script>
// 🔥 SHOW USER NAME
const name = localStorage.getItem("user_name");
if (name) {
    document.getElementById("userName").innerText = "👤 " + name;
}

//  PROTECT PAGE
if (!localStorage.getItem("user_id")) {
    window.location.href = "/login-page";
}

//  NAVIGATION
function goHome() {
    window.location.href = "/home";
}

function goJob() {
    window.location.href = "/predict-page";
}

function goResume() {
    window.location.href = "/resume-page";
}

function goHistory() {
    window.location.href = "/history-page";
}

// 🔓 LOGOUT
function logout() {
    localStorage.clear();
    alert("Logged out successfully");
    window.location.href = "/login-page";
}
</script>

</body>
</html>
