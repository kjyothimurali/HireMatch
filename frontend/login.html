<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - HireMatch</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
    }

    input:focus {
        border-color: #4facfe;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00c6ff;
    }

    .signup-link {
        margin-top: 15px;
        font-size: 14px;
    }

    .signup-link a {
        color: #4facfe;
        text-decoration: none;
        font-weight: bold;
    }

    .error {
        color: red;
        font-size: 13px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="login-container">

    <h2> Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="loginUser()">Login</button>

    <p class="error" id="errorMsg"></p>

    <div class="signup-link">
        Don't have an account? <a href="/signup-page">Sign up</a>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
